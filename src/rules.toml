[[rules]]
name = "WordPress"
category = "cms"
signals = [
    # The canonical, version-bearing fingerprint Wappalyzer keys on
    # first  -  present even when wp-content/wp-includes paths are
    # CDN-rewritten or the front end is headless. Its absence here
    # silently missed any such WordPress site.
    { type = "body", value = "<meta name=\"generator\" content=\"WordPress" },
    { type = "body", value = "name='generator' content='WordPress" },
    { type = "body", value = "/wp-content/" },
    { type = "body", value = "/wp-includes/" },
    { type = "body", value = "wp-json" },
    { type = "cookie", value = "wordpress_" },
    { type = "body", value = "wp-emoji-release" },
    { type = "header", key = "x-pingback", value = "xmlrpc.php" },
]

